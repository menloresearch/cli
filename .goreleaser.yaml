# .goreleaser.yaml
version: 2

project_name: menlo-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: menlo-cli
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    binary: menlo-cli
    main: ./cmd/menlo-cli
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: menloresearch
    name: menlo-cli

brew:
  - id: homebrew
    github:
      owner: menloresearch
      name: homebrew-menlo-cli
    name: menlo-cli
    description: A CLI tool for accessing the Menlo Robot.
    license: MIT
    homepage: https://github.com/menloresearch/menlo-cli
    test: |
      system "#{bin}/menlo-cli --help"
    caveats: Run 'menlo-cli init' to set up your API key and default robot.