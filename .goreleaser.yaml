# .goreleaser.yaml
version: 2

project_name: menlo

before:
  hooks:
    - go mod tidy

builds:
  - id: menlo
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    binary: menlo
    main: ./cmd/menlo
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: menloresearch
    name: cli
