name: CI

on:
  push:
    branches:
      - main
      - release
  pull_request:
    branches:
      - main
      - release

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Debug directory
        run: |
          pwd
          ls -la
          ls -la cmd/

      - name: Run tests
        run: go test -v ./...

      - name: Build
        run: |
          go build -o menlo ./cmd/menlo
          ls -la menlo